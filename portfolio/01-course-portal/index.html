<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Launch Lab — course portal · by Phorethought</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--bg:#f6f7fb;--panel:#fff;--ink:#161a2b;--soft:#5b6076;--muted:#9aa0b4;--line:#e9ebf2;--accent:#5b5bf0;--good:#22b07d;--disp:'Space Grotesk',sans-serif;--sans:'Inter',system-ui,sans-serif}
  body{font-family:var(--sans);background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased}
  .disp{font-family:var(--disp)}
  .app{display:grid;grid-template-columns:300px 1fr;min-height:100vh}
  /* sidebar */
  .side{background:var(--panel);border-right:1px solid var(--line);padding:24px;display:flex;flex-direction:column}
  .brand{font-family:var(--disp);font-weight:700;font-size:20px;display:flex;align-items:center;gap:8px;margin-bottom:4px}
  .brand .d{width:24px;height:24px;border-radius:7px;background:linear-gradient(135deg,#5b5bf0,#8b5cf6)}
  .sub{font-size:12px;color:var(--muted);margin-bottom:20px}
  .prog{background:var(--bg);border-radius:12px;padding:14px;margin-bottom:22px}
  .prog .t{display:flex;justify-content:space-between;font-size:12px;color:var(--soft);margin-bottom:8px}
  .prog .t b{color:var(--accent)}
  .track{height:8px;background:#e6e8f2;border-radius:5px;overflow:hidden}.track .fl{height:100%;background:linear-gradient(90deg,#5b5bf0,#8b5cf6);width:0;transition:width .5s}
  .mods{flex:1;overflow:auto}
  .modt{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin:16px 0 8px}
  .les{display:flex;align-items:center;gap:11px;padding:10px;border-radius:10px;cursor:pointer;transition:background .15s}
  .les:hover{background:var(--bg)}.les.on{background:#eef0ff}
  .les .ic{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;background:#e6e8f2;color:var(--muted)}
  .les.done .ic{background:var(--good);color:#fff}.les.on .ic{background:var(--accent);color:#fff}.les.locked{opacity:.5;cursor:not-allowed}
  .les .nm{font-size:14px;font-weight:500}.les .du{font-size:11px;color:var(--muted)}
  /* main */
  .main{padding:34px 44px;max-width:820px}
  .crumb{font-size:12px;letter-spacing:1px;text-transform:uppercase;color:var(--accent);margin-bottom:10px}
  .ltitle{font-family:var(--disp);font-weight:700;font-size:30px;letter-spacing:-.5px;margin-bottom:20px}
  .video{aspect-ratio:16/9;border-radius:16px;background:linear-gradient(135deg,#2a2150,#5b5bf0);display:flex;align-items:center;justify-content:center;margin-bottom:24px;position:relative;overflow:hidden;cursor:pointer}
  .video .play{width:70px;height:70px;border-radius:50%;background:rgba(255,255,255,.9);display:flex;align-items:center;justify-content:center;font-size:26px;color:#5b5bf0;padding-left:5px}
  .video .lbl{position:absolute;bottom:14px;left:16px;color:#fff;font-size:13px;opacity:.85}
  .body{font-size:15.5px;color:var(--soft);line-height:1.7;margin-bottom:22px}
  .res{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:30px}
  .res span{font-size:13px;background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:7px 14px;color:var(--soft)}
  .navrow{display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--line);padding-top:22px}
  .btn{border:none;border-radius:10px;padding:13px 24px;font-family:var(--sans);font-weight:600;font-size:14px;cursor:pointer;transition:transform .12s,opacity .2s}
  .btn-ghost{background:var(--panel);border:1px solid var(--line);color:var(--soft)}
  .btn-fill{background:var(--accent);color:#fff}.btn-fill:hover{transform:translateY(-2px)}.btn-fill:disabled{opacity:.5}
  .done-badge{color:var(--good);font-weight:600;font-size:14px;display:flex;align-items:center;gap:6px}
  .credit{margin-top:30px;font-size:11px;color:var(--muted)}
  @media(max-width:820px){.app{grid-template-columns:1fr}.side{border-right:none;border-bottom:1px solid var(--line)}.main{padding:24px}}
</style>
</head>
<body>
<div class="app">
  <aside class="side">
    <div class="brand"><span class="d"></span>Launch Lab</div>
    <div class="sub">Build &amp; launch your thing in 6 lessons</div>
    <div class="prog"><div class="t"><span>Your progress</span><b id="ppct">0%</b></div><div class="track"><div class="fl" id="pfl"></div></div></div>
    <div class="mods" id="mods"></div>
  </aside>
  <main class="main" id="main"></main>
</div>
<script>
const LESSONS=[
  {id:0,mod:'Foundations',t:'Welcome & setup',du:'5 min',body:'Get oriented and set up everything you need. By the end you’ll have your workspace ready and a clear picture of the next six lessons.',res:['Setup checklist','Tool list']},
  {id:1,mod:'Foundations',t:'Find your angle',du:'12 min',body:'The single most important step: nailing the angle that makes people care. We’ll run the positioning exercise together.',res:['Angle worksheet','Examples']},
  {id:2,mod:'Build',t:'Your first build',du:'18 min',body:'Hands-on. We build the core of your project step by step — no fluff, just the parts that matter.',res:['Starter files','Walkthrough']},
  {id:3,mod:'Build',t:'Ship it live',du:'15 min',body:'Take what you built and put it on the internet. Deployment, domain, done.',res:['Deploy guide']},
  {id:4,mod:'Grow',t:'Get your first 100',du:'20 min',body:'The outreach playbook that gets your first real users without a budget.',res:['Outreach scripts','Tracker']},
  {id:5,mod:'Grow',t:'Scale & systemize',du:'16 min',body:'Turn the chaos into a repeatable system so growth doesn’t depend on you grinding.',res:['Systems template']},
];
const KEY='launchlab_done';
let done=new Set(JSON.parse(localStorage.getItem(KEY)||'[]'));
let cur=0;
// first incomplete lesson as current
cur=LESSONS.findIndex(l=>!done.has(l.id));if(cur<0)cur=LESSONS.length-1;
const modsEl=document.getElementById('mods'),mainEl=document.getElementById('main');
function unlocked(id){return id===0||done.has(id-1)||done.has(id);}
function renderSidebar(){
  let html='',lastMod='';
  LESSONS.forEach(l=>{
    if(l.mod!==lastMod){html+='<div class="modt">'+l.mod+'</div>';lastMod=l.mod;}
    const isDone=done.has(l.id),isCur=l.id===cur,lock=!unlocked(l.id);
    const ic=isDone?'✓':lock?'🔒':(l.id+1);
    html+='<div class="les'+(isDone?' done':'')+(isCur?' on':'')+(lock?' locked':'')+'" data-id="'+l.id+'"><div class="ic">'+ic+'</div><div><div class="nm">'+l.t+'</div><div class="du">'+l.du+'</div></div></div>';
  });
  modsEl.innerHTML=html;
  modsEl.querySelectorAll('.les').forEach(el=>{const id=+el.dataset.id;if(unlocked(id))el.onclick=()=>{cur=id;renderAll();};});
  const pct=Math.round(done.size/LESSONS.length*100);
  document.getElementById('ppct').textContent=pct+'%';document.getElementById('pfl').style.width=pct+'%';
}
function renderMain(){
  const l=LESSONS[cur],isDone=done.has(l.id);
  mainEl.innerHTML='<div class="crumb">'+l.mod+' · Lesson '+(l.id+1)+' of '+LESSONS.length+'</div>'+
    '<h1 class="ltitle">'+l.t+'</h1>'+
    '<div class="video"><div class="play">▶</div><div class="lbl">'+l.t+' · '+l.du+'</div></div>'+
    '<p class="body">'+l.body+'</p>'+
    '<div class="res">'+l.res.map(r=>'<span>📎 '+r+'</span>').join('')+'</div>'+
    '<div class="navrow"><button class="btn btn-ghost" id="prev"'+(l.id===0?' disabled':'')+'>← Previous</button>'+
    (isDone?'<span class="done-badge">✓ Completed</span>':'')+
    '<button class="btn btn-fill" id="next">'+(l.id===LESSONS.length-1?(isDone?'Finished 🎉':'Mark complete ✓'):'Mark complete & continue →')+'</button></div>'+
    '<div class="credit">Launch Lab · Sample build by Phorethought — <a href="../../index.html" style="color:inherit;text-decoration:none">phorethought.com</a></div>';
  const prev=document.getElementById('prev');if(prev&&l.id>0)prev.onclick=()=>{cur=l.id-1;renderAll();};
  document.getElementById('next').onclick=()=>{done.add(l.id);localStorage.setItem(KEY,JSON.stringify([...done]));
    if(l.id<LESSONS.length-1)cur=l.id+1;renderAll();};
}
function renderAll(){renderSidebar();renderMain();}
renderAll();
</script>
</body>
</html>
