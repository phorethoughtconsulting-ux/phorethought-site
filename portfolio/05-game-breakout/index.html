<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEON BREAK — a browser game by Phorethought</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--bg:#06060f;--cyan:#22e3ff;--pink:#ff3ea5;--lime:#c8ff2e;--violet:#9b6bff}
  html,body{height:100%}
  body{background:radial-gradient(circle at 50% 0%,#12122a,#06060f 70%);color:#fff;font-family:'Inter',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;overflow:hidden;gap:14px;padding:16px}
  .title{font-family:'Orbitron',sans-serif;font-weight:900;font-size:clamp(22px,4vw,34px);letter-spacing:4px;background:linear-gradient(90deg,var(--cyan),var(--pink));-webkit-background-clip:text;background-clip:text;color:transparent;text-shadow:0 0 30px rgba(34,227,255,.3)}
  .hud{display:flex;gap:28px;font-family:'Orbitron',sans-serif;font-size:14px;letter-spacing:2px;color:#9aa}
  .hud b{color:#fff}
  .stage{position:relative;border-radius:14px;overflow:hidden;box-shadow:0 0 0 1px rgba(255,255,255,.08),0 30px 80px rgba(0,0,0,.6)}
  canvas{display:block;background:linear-gradient(180deg,#0a0a1c,#070712);touch-action:none;max-width:100%;height:auto}
  .overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;background:rgba(6,6,15,.82);backdrop-filter:blur(4px);text-align:center;padding:20px}
  .overlay h2{font-family:'Orbitron',sans-serif;font-weight:700;font-size:clamp(26px,5vw,40px);letter-spacing:2px}
  .overlay p{color:#9aa;font-size:14px;max-width:300px}
  .btn{font-family:'Orbitron',sans-serif;font-weight:700;letter-spacing:2px;font-size:14px;padding:14px 30px;border:none;border-radius:40px;cursor:pointer;color:#06060f;background:linear-gradient(90deg,var(--cyan),var(--lime));box-shadow:0 0 30px rgba(34,227,255,.4);transition:transform .15s}
  .btn:hover{transform:scale(1.05)}
  .hidden{display:none}
  .foot{font-family:'Orbitron',sans-serif;font-size:11px;letter-spacing:2px;color:#445;margin-top:4px}
</style>
</head>
<body>
  <div class="title">NEON&nbsp;BREAK</div>
  <div class="hud"><div>SCORE <b id="score">0</b></div><div>LIVES <b id="lives">3</b></div><div>BEST <b id="best">0</b></div></div>
  <div class="stage">
    <canvas id="game" width="720" height="460"></canvas>
    <div class="overlay" id="overlay">
      <h2 id="ov-title">NEON BREAK</h2>
      <p id="ov-text">Move your mouse (or finger) to steer the paddle. Clear every brick. Don't drop the ball.</p>
      <button class="btn" id="startBtn">PLAY</button>
    </div>
  </div>
  <div class="foot">Sample build by Phorethought · <a href="../../index.html" style="color:inherit;text-decoration:none">phorethought.com</a></div>

<script>
const cv=document.getElementById('game'),ctx=cv.getContext('2d');
const W=cv.width,H=cv.height;
const scoreEl=document.getElementById('score'),livesEl=document.getElementById('lives'),bestEl=document.getElementById('best');
const overlay=document.getElementById('overlay'),ovTitle=document.getElementById('ov-title'),ovText=document.getElementById('ov-text'),startBtn=document.getElementById('startBtn');
const COLORS=['#ff3ea5','#9b6bff','#22e3ff','#c8ff2e','#ffb347'];
let best=+(localStorage.getItem('neonbreak_best')||0); bestEl.textContent=best;
let paddle,ball,bricks,score,lives,running,particles,level;

function makeBricks(){
  const rows=5,cols=10,bw=62,bh=20,gap=8,offX=(W-(cols*(bw+gap)-gap))/2,offY=50;
  const arr=[];
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
    arr.push({x:offX+c*(bw+gap),y:offY+r*(bh+gap),w:bw,h:bh,c:COLORS[r%COLORS.length],alive:true});
  }
  return arr;
}
function reset(full){
  paddle={w:110,h:14,x:W/2-55,y:H-30};
  ball={x:W/2,y:H-50,r:8,dx:4.2*(Math.random()<.5?1:-1),dy:-4.6,speed:1};
  particles=[];
  if(full){score=0;lives=3;level=1;bricks=makeBricks();}
  scoreEl.textContent=score;livesEl.textContent=lives;
}
function spawnP(x,y,c){for(let i=0;i<10;i++)particles.push({x,y,vx:(Math.random()-.5)*6,vy:(Math.random()-.5)*6,life:1,c});}
function move(clientX){
  const rect=cv.getBoundingClientRect(),scale=W/rect.width;
  let nx=(clientX-rect.left)*scale-paddle.w/2;
  paddle.x=Math.max(0,Math.min(W-paddle.w,nx));
}
cv.addEventListener('mousemove',e=>move(e.clientX));
cv.addEventListener('touchmove',e=>{e.preventDefault();move(e.touches[0].clientX);},{passive:false});

function loop(){
  if(!running)return;
  ctx.clearRect(0,0,W,H);
  // ball
  ball.x+=ball.dx;ball.y+=ball.dy;
  if(ball.x<ball.r||ball.x>W-ball.r)ball.dx*=-1;
  if(ball.y<ball.r)ball.dy*=-1;
  // paddle collide
  if(ball.y+ball.r>=paddle.y&&ball.y< paddle.y+paddle.h&&ball.x>paddle.x&&ball.x<paddle.x+paddle.w&&ball.dy>0){
    const hit=(ball.x-(paddle.x+paddle.w/2))/(paddle.w/2);
    const sp=Math.min(7.5,Math.hypot(ball.dx,ball.dy)+.15);
    const ang=hit*1.05;
    ball.dx=sp*Math.sin(ang);ball.dy=-sp*Math.cos(ang);
  }
  // bricks
  for(const b of bricks){ if(!b.alive)continue;
    if(ball.x>b.x&&ball.x<b.x+b.w&&ball.y-ball.r<b.y+b.h&&ball.y+ball.r>b.y){
      b.alive=false;ball.dy*=-1;score+=10;scoreEl.textContent=score;spawnP(ball.x,ball.y,b.c);break;
    }
  }
  // lose ball
  if(ball.y>H+20){
    lives--;livesEl.textContent=lives;
    if(lives<=0){return end(false);}
    reset(false);
  }
  // win
  if(bricks.every(b=>!b.alive)){
    level++;score+=100;scoreEl.textContent=score;bricks=makeBricks();reset(false);
    ball.dx*=1.1;ball.dy*=1.1;
  }
  draw();
  requestAnimationFrame(loop);
}
function draw(){
  // bricks
  for(const b of bricks){if(!b.alive)continue;
    ctx.fillStyle=b.c;ctx.shadowColor=b.c;ctx.shadowBlur=14;
    ctx.fillRect(b.x,b.y,b.w,b.h);
  }
  ctx.shadowBlur=0;
  // paddle
  ctx.fillStyle='#fff';ctx.shadowColor='#22e3ff';ctx.shadowBlur=18;
  roundRect(paddle.x,paddle.y,paddle.w,paddle.h,7);ctx.fill();
  // ball
  ctx.beginPath();ctx.fillStyle='#c8ff2e';ctx.shadowColor='#c8ff2e';ctx.shadowBlur=20;
  ctx.arc(ball.x,ball.y,ball.r,0,7);ctx.fill();ctx.shadowBlur=0;
  // particles
  for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.life-=.04;
    if(p.life<=0){particles.splice(i,1);continue;}
    ctx.globalAlpha=p.life;ctx.fillStyle=p.c;ctx.fillRect(p.x,p.y,3,3);ctx.globalAlpha=1;}
}
function roundRect(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
function start(){overlay.classList.add('hidden');reset(true);running=true;loop();}
function end(win){
  running=false;
  if(score>best){best=score;localStorage.setItem('neonbreak_best',best);bestEl.textContent=best;}
  ovTitle.textContent=win?'YOU WIN':'GAME OVER';
  ovText.textContent='Score: '+score+'  ·  Best: '+best;
  startBtn.textContent='PLAY AGAIN';
  overlay.classList.remove('hidden');
}
startBtn.addEventListener('click',start);
</script>
</body>
</html>
