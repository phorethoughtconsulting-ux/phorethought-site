<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brewhaus — Spin to Win · by Phorethought</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--bg:#1a1206;--card:#fffdf8;--ink:#2a1c0c;--soft:#7a6650;--accent:#e0792b;--accent2:#c9a227;--green:#2f9e6a;--disp:'Fredoka',system-ui,sans-serif;--sans:'Inter',system-ui,sans-serif}
  body{font-family:var(--sans);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;color:var(--ink);background:radial-gradient(circle at 50% 20%,#3a2a14,#1a1206 70%);overflow:hidden}
  .card{background:var(--card);border-radius:26px;max-width:440px;width:100%;padding:34px 28px 30px;text-align:center;box-shadow:0 30px 80px rgba(0,0,0,.5);position:relative;overflow:hidden}
  .brand{font-family:var(--disp);font-weight:700;font-size:15px;letter-spacing:3px;text-transform:uppercase;color:var(--accent)}
  h1{font-family:var(--disp);font-weight:700;font-size:34px;margin:6px 0 4px}
  .sub{font-size:14px;color:var(--soft);margin-bottom:22px}
  .wheelwrap{position:relative;width:300px;height:300px;margin:0 auto 8px}
  canvas{display:block}
  .pointer{position:absolute;top:-6px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:14px solid transparent;border-right:14px solid transparent;border-top:26px solid var(--ink);z-index:3;filter:drop-shadow(0 2px 2px rgba(0,0,0,.3))}
  .hub{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:54px;height:54px;border-radius:50%;background:var(--ink);color:#fff;display:flex;align-items:center;justify-content:center;font-family:var(--disp);font-weight:700;font-size:13px;z-index:2;border:4px solid var(--card)}
  .spin{margin-top:14px;width:100%;border:none;border-radius:40px;padding:16px;font-family:var(--disp);font-weight:700;font-size:18px;letter-spacing:1px;color:#fff;background:linear-gradient(100deg,var(--accent),var(--accent2));cursor:pointer;box-shadow:0 10px 26px rgba(224,121,43,.4);transition:transform .15s}
  .spin:hover{transform:translateY(-2px)}.spin:disabled{opacity:.55;cursor:default;transform:none}
  .result{display:none;margin-top:18px;animation:pop .4s}
  .result.show{display:block}
  @keyframes pop{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:none}}
  .result .won{font-family:var(--disp);font-weight:700;font-size:15px;color:var(--soft)}
  .result .prize{font-family:var(--disp);font-weight:700;font-size:30px;color:var(--accent);margin:2px 0 14px}
  .claim{display:flex;gap:8px}
  .claim input{flex:1;border:1px solid #e6ddcc;border-radius:12px;padding:13px 15px;font-family:inherit;font-size:15px;outline:none}
  .claim input:focus{border-color:var(--accent)}
  .claim button{border:none;border-radius:12px;padding:13px 18px;font-family:var(--disp);font-weight:700;background:var(--ink);color:#fff;cursor:pointer}
  .done{display:none;margin-top:18px;color:var(--green);font-family:var(--disp);font-weight:600;font-size:16px}
  .done.show{display:block}
  .fine{font-size:11px;color:#b3a690;margin-top:16px}
  .credit{font-size:11px;color:#cabfa9;margin-top:6px;letter-spacing:1px}
  .confetti{position:fixed;width:9px;height:14px;top:-20px;z-index:50;pointer-events:none}
</style>
</head>
<body>
  <div class="card">
    <div class="brand">☕ Brewhaus Rewards</div>
    <h1>Spin to Win</h1>
    <div class="sub">One spin per visitor. Win a treat on your next order.</div>
    <div class="wheelwrap">
      <div class="pointer"></div>
      <canvas id="wheel" width="300" height="300"></canvas>
      <div class="hub">SPIN</div>
    </div>
    <button class="spin" id="spinBtn">SPIN THE WHEEL</button>
    <div class="result" id="result">
      <div class="won">🎉 You won</div>
      <div class="prize" id="prize">—</div>
      <div class="claim"><input id="email" type="email" placeholder="Email to claim your prize"><button id="claim">Claim</button></div>
    </div>
    <div class="done" id="done">✓ Sent! Check your inbox for the code.</div>
    <div class="fine">Demo — a live version emails the code &amp; logs the lead. Built per-brand by Phorethought.</div>
    <div class="credit">Sample build by Phorethought · phorethought.com</div>
  </div>
<script>
const PRIZES=[
  {t:'10% OFF',c:'#e0792b'},
  {t:'FREE DRINK',c:'#2a1c0c'},
  {t:'15% OFF',c:'#c9a227'},
  {t:'FREE PASTRY',c:'#a8541f'},
  {t:'5% OFF',c:'#6b4e2e'},
  {t:'MYSTERY 🎁',c:'#2f9e6a'},
];
const cv=document.getElementById('wheel'),ctx=cv.getContext('2d');
const N=PRIZES.length,seg=(Math.PI*2)/N,R=150;
let rotation=0,spun=false,won=null;
function draw(){
  ctx.clearRect(0,0,300,300);ctx.save();ctx.translate(R,R);ctx.rotate(rotation);
  for(let i=0;i<N;i++){
    const a=i*seg;
    ctx.beginPath();ctx.moveTo(0,0);ctx.arc(0,0,R,a,a+seg);ctx.closePath();
    ctx.fillStyle=PRIZES[i].c;ctx.fill();ctx.strokeStyle='rgba(255,253,248,.5)';ctx.lineWidth=2;ctx.stroke();
    ctx.save();ctx.rotate(a+seg/2);ctx.textAlign='right';ctx.fillStyle='#fff';ctx.font='700 15px Fredoka, sans-serif';
    ctx.fillText(PRIZES[i].t,R-16,5);ctx.restore();
  }
  ctx.restore();
}
function spin(){
  if(spun)return;spun=true;document.getElementById('spinBtn').disabled=true;
  won=Math.floor(Math.random()*N);
  // land winner's center under top pointer (top = -90deg = 1.5π)
  const targetCenter=won*seg+seg/2;
  const final=Math.PI*2*6 + (1.5*Math.PI - targetCenter);
  const start=rotation,dur=4400,t0=performance.now();
  function step(now){
    const k=Math.min(1,(now-t0)/dur);const e=1-Math.pow(1-k,3); // easeOutCubic
    rotation=start+(final-start)*e;draw();
    if(k<1)requestAnimationFrame(step);else finish();
  }
  requestAnimationFrame(step);
}
function finish(){
  document.getElementById('prize').textContent=PRIZES[won].t;
  document.getElementById('result').classList.add('show');
  confetti();
}
function confetti(){
  const colors=['#e0792b','#c9a227','#2f9e6a','#a8541f','#fff'];
  for(let i=0;i<60;i++){
    const d=document.createElement('div');d.className='confetti';
    d.style.left=Math.random()*100+'vw';d.style.background=colors[i%colors.length];
    d.style.transform='rotate('+Math.random()*360+'deg)';
    const dur=2+Math.random()*2;
    d.animate([{top:'-20px',opacity:1},{top:'100vh',opacity:.9}],{duration:dur*1000,easing:'ease-in'});
    document.body.appendChild(d);setTimeout(()=>d.remove(),dur*1000);
  }
}
document.getElementById('spinBtn').onclick=spin;
document.getElementById('claim').onclick=()=>{document.getElementById('result').classList.remove('show');document.getElementById('done').classList.add('show');};
draw();
</script>
</body>
</html>
